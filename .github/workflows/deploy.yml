name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy → dampcig.dk
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^ \* Version:.*$/ * Version:     ${TAG_VERSION}/" dc-sw-prefetch.php
          sed -i "s/^define( 'DC_SWP_VERSION', '[^']*' );/define( 'DC_SWP_VERSION', '${TAG_VERSION}' );/" dc-sw-prefetch.php
          sed -i "s/^Stable tag: .*/Stable tag: ${TAG_VERSION}/" readme.txt
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${TAG_VERSION}\"/" package.json
          echo "Stamped version ${TAG_VERSION}"

      - name: Deploy via rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 22" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.distignore' \
            --exclude='phpcs.xml' \
            --exclude='phpunit.xml.dist' \
            --exclude='.phpunit.cache' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='README.md' \
            --exclude='scripts' \
            --exclude='tests' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='eslint.config.mjs' \
            ./ ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:${{ vars.DEPLOY_PATH }}dc-sw-prefetch/

      - name: Remove dev-only files from server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 22 \
            ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
            "rm -f ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/.distignore \
                   ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/.gitignore \
                   ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/.gitattributes \
                   ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/phpcs.xml \
                   ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/phpunit.xml.dist \
                   ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/composer.json \
                   ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/composer.lock \
                   ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/package.json \
                   ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/package-lock.json \
                   ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/README.md && \
             rm -f  ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/eslint.config.mjs && \
             rm -rf ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/.github \
                    ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/.phpunit.cache \
                    ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/scripts \
                    ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/tests \
                    ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/vendor \
                    ${{ vars.DEPLOY_PATH }}dc-sw-prefetch/node_modules"

      - name: Build wordpress.org ZIP
        run: |
          mkdir -p dist
          zip -r dist/dc-sw-prefetch.zip . \
            -x '*.git*' -x '.github/*' -x '.gitignore' -x '.gitattributes' \
            -x '.distignore' -x 'phpcs.xml' -x 'phpunit.xml.dist' -x '.phpunit.cache/*' \
            -x 'composer.json' -x 'composer.lock' -x 'README.md' -x 'scripts/*' \
            -x 'tests/*' -x 'vendor/*' -x 'node_modules/*' -x 'package.json' \
            -x 'package-lock.json' -x 'dist/*' -x 'eslint.config.mjs'

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: dc-sw-prefetch-${{ github.sha }}
          path: dist/dc-sw-prefetch.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dc-sw-prefetch.zip
          generate_release_notes: true
